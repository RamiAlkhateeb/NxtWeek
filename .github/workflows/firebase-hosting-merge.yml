# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Install the correct .NET version for compiling Blazor WASM
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Configured for your .NET 10 project
      
      # 2. Build and publish the static files inside the runner
      - name: Publish Blazor App
        run: dotnet publish MealPlanner.Web/MealPlanner.Web.csproj -c Release -o output

        # 3. Deploy the compiled assets straight to Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MEAL_PLANNER_AF799 }}
          channelId: live
          projectId: meal-planner-af799
